<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/match.css') }}">
  <title>{{ title or "Word Matching Game" }}</title>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>{{ title or "Word Matching Game" }}</h1>
      <div class="meta">
        <div class="pill">Score: <strong id="score">0</strong>/<span id="total">0</span></div>
        <div class="pill">Attempts: <strong id="attempts">0</strong></div>
      </div>
    </header>

    <div class="board">
      <section class="col" aria-label="Left column">
        <h2>{{ left_label or "Column A" }}</h2>
        <div class="list" id="leftList"></div>
      </section>

      <section class="col" aria-label="Right column">
        <h2>{{ right_label or "Column B" }}</h2>
        <div class="list" id="rightList"></div>
      </section>
    </div>

<div class="controls">
  <a href="{{ url_for('games') }}" class="back-link">
    ← Ana sayfaya dön
  </a>

  <button type="button" id="resetBtn">Sıfırla</button>

  <form method="post" action="{{ submit_url or url_for('submit_match') }}">
    <input type="hidden" name="results_json" id="resultsJson" value="{}" />
    <button class="primary" type="submit" id="submitBtn" disabled>
      Sonuçları Gönder
    </button>
  </form>
</div>

    <div class="msg" id="msg"></div>
  </div>

  <script>
  const PAIRS = {{ pairs|tojson }};
  const total = PAIRS.length;

  // How many pairs visible at once (Duolingo style)
  const VISIBLE = Math.min(6, total);

  const state = {
    selectedLeftEl: null,
    selectedRightEl: null,
    attempts: 0,
    score: 0,
    matches: {},
    remainingIds: [],
    finished: false,
  };

  const els = {
    leftList: document.getElementById("leftList"),
    rightList: document.getElementById("rightList"),
    msg: document.getElementById("msg"),
    score: document.getElementById("score"),
    total: document.getElementById("total"),
    attempts: document.getElementById("attempts"),
    resetBtn: document.getElementById("resetBtn"),
    submitBtn: document.getElementById("submitBtn"),
    resultsJson: document.getElementById("resultsJson")
  };

  els.total.textContent = String(total);

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function byId(id) {
    const n = Number(id);
    return PAIRS.find(p => Number(p.id) === n);
  }

  function mesaj(text) {
    els.msg.textContent = text || "";
  }

  function updateHUD() {
    els.score.textContent = String(state.score);
    els.attempts.textContent = String(state.attempts);

    els.resultsJson.value = JSON.stringify({
      attempts: state.attempts,
      score: state.score,
      total: total,
      matches: state.matches
    });

    // Enable submit only when completed all pairs
    els.submitBtn.disabled = state.score !== total;
  }

  function clearSelections() {
    document.querySelectorAll(".item.selected").forEach(el => el.classList.remove("selected"));
    state.selectedLeftEl = null;
    state.selectedRightEl = null;
  }

  function flashWrong(aEl, bEl) {
    [aEl, bEl].forEach(el => el && el.classList.add("wrongflash"));
    setTimeout(() => [aEl, bEl].forEach(el => el && el.classList.remove("wrongflash")), 350);
  }

  function makeItem(side) {
    const div = document.createElement("div");
    div.className = "item";
    div.role = "button";
    div.tabIndex = 0;
    div.dataset.side = side;
    div.dataset.id = ""; // filled later

    const label = document.createElement("div");
    label.className = "label";
    label.textContent = "";

    const tag = document.createElement("div");
    tag.className = "tag";
    tag.textContent = "";

    div.appendChild(label);
    div.appendChild(tag);

    function onPick() {
      if (state.finished) return;
      if (div.classList.contains("done")) return;

      // toggle off
      if (div.classList.contains("selected")) {
        div.classList.remove("selected");
        if (side === "left") state.selectedLeftEl = null;
        else state.selectedRightEl = null;
        return;
      }

      // one selected per column
      document.querySelectorAll(`.item.selected[data-side="${side}"]`)
        .forEach(el => el.classList.remove("selected"));

      div.classList.add("selected");
      if (side === "left") state.selectedLeftEl = div;
      else state.selectedRightEl = div;

      tryResolve();
    }

    div.addEventListener("click", onPick);
    div.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); onPick(); }
    });

    return div;
  }

  function setCard(div, id, text) {
    div.dataset.id = String(Number(id));
    div.querySelector(".label").textContent = text;
    div.querySelector(".tag").textContent = "";
    div.classList.remove("matched", "selected", "wrongflash", "done");
  }

  function disableCard(div, text) {
    div.querySelector(".tag").textContent = text || "Bitti";
    div.classList.add("done");
    div.classList.remove("selected", "wrongflash");
  }

  function refill(leftEl, rightEl) {
    if (state.remainingIds.length === 0) {
      // No more new pairs to bring in — these slots become inactive
      disableCard(leftEl, "Bitti");
      disableCard(rightEl, "Bitti");
      return;
    }

    const newId = Number(state.remainingIds.pop());
    const pair = byId(newId);
    setCard(leftEl, newId, pair.left);
    setCard(rightEl, newId, pair.right);

    // Optional: move right card to random position for extra "match madness" feel
    const newPos = Math.floor(Math.random() * els.rightList.children.length);
    els.rightList.removeChild(rightEl);
    els.rightList.insertBefore(rightEl, els.rightList.children[newPos] || null);
  }

  function finishIfDone() {
    if (state.score === total) {
      state.finished = true;
      mesaj("🎉 Tebrikler! Hepsini eşleştirdin!");
      // Lock board
      document.querySelectorAll(".item").forEach(el => el.classList.add("done"));
    }
  }

  function tryResolve() {
    if (!state.selectedLeftEl || !state.selectedRightEl) return;

    state.attempts += 1;

    const leftId = Number(state.selectedLeftEl.dataset.id);
    const rightId = Number(state.selectedRightEl.dataset.id);

    if (leftId === rightId) {
      state.score += 1;
      state.matches[String(leftId)] = rightId;

      const leftEl = state.selectedLeftEl;
      const rightEl = state.selectedRightEl;

      [leftEl, rightEl].forEach(el => {
        el.classList.remove("selected");
        el.classList.add("matched");
        el.querySelector(".tag").textContent = "✔";
      });

      mesaj("✅ Doğru eşleşme!");
      clearSelections();
      updateHUD();

      // Replace matched cards in-place
      setTimeout(() => {
        refill(leftEl, rightEl);
        updateHUD();
        finishIfDone();
      }, 200);

    } else {
      flashWrong(state.selectedLeftEl, state.selectedRightEl);
      mesaj("❌ Yanlış. Tekrar deneyin.");
      clearSelections();
      updateHUD();
    }
  }

  function renderInitial() {
    els.leftList.innerHTML = "";
    els.rightList.innerHTML = "";

    const ids = shuffle(PAIRS.map(p => Number(p.id)));
    const inPlay = ids.slice(0, VISIBLE);
    state.remainingIds = ids.slice(VISIBLE);

    // Build fixed slots (so refill happens "in place")
    const leftSlots = [];
    const rightSlots = [];

    inPlay.forEach(id => {
      const p = byId(id);
      const el = makeItem("left");
      setCard(el, id, p.left);
      leftSlots.push(el);
      els.leftList.appendChild(el);
    });

    shuffle(inPlay).forEach(id => {
      const p = byId(id);
      const el = makeItem("right");
      setCard(el, id, p.right);
      rightSlots.push(el);
      els.rightList.appendChild(el);
    });

    mesaj("Her sütundan bir kelime seçin.");
    updateHUD();
  }

  function resetGame() {
    state.selectedLeftEl = null;
    state.selectedRightEl = null;
    state.attempts = 0;
    state.score = 0;
    state.matches = {};
    state.remainingIds = [];
    state.finished = false;
    renderInitial();
  }

  els.resetBtn.addEventListener("click", resetGame);

  resetGame();
</script>

</body>
</html>
